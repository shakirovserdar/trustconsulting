<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Girişi — Trust Consulting</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',sans-serif; background:linear-gradient(135deg,#01263a,#2271b1); min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .login-kart { background:white; border-radius:20px; padding:2.5rem 2rem; width:100%; max-width:380px; box-shadow:0 20px 60px rgba(0,0,0,0.3); }
        .login-logo { text-align:center; margin-bottom:1.8rem; }
        .login-logo h1 { color:#01263a; font-size:1.4rem; margin-top:0.5rem; }
        .login-logo p { color:#4a7a9b; font-size:0.85rem; }
        .form-grup { margin-bottom:1.1rem; }
        label { display:block; font-size:0.85rem; font-weight:600; color:#01263a; margin-bottom:0.4rem; }
        input { width:100%; padding:0.75rem 1rem; border:1.5px solid #cde0f5; border-radius:10px; font-size:0.95rem; color:#01263a; transition:border 0.2s; }
        input:focus { outline:none; border-color:#2271b1; box-shadow:0 0 0 3px rgba(34,113,177,0.15); }
        .btn-giris { width:100%; padding:0.85rem; background:linear-gradient(135deg,#2271b1,#01263a); color:white; border:none; border-radius:12px; font-size:1rem; font-weight:700; cursor:pointer; margin-top:0.5rem; transition:opacity 0.2s; }
        .btn-giris:hover { opacity:0.88; }
        .hata { background:#fff0f0; border:1px solid #ffcccc; border-radius:8px; padding:0.7rem 1rem; color:#c0392b; font-size:0.88rem; margin-bottom:1rem; text-align:center; }
    </style>
</head>
<body>
<div class="login-kart">
    <div class="login-logo">
        <div style="font-size:2.5rem;">🔐</div>
        <h1>Trust Consulting</h1>
        <p>Admin Paneli</p>
    </div>
    {% if hata %}
    <div class="hata">⚠️ {{ hata }}</div>
    {% endif %}
    <form method="POST">
        <div class="form-grup">
            <label>👤 Kullanıcı Adı</label>
            <input type="text" name="kullanici" required autofocus placeholder="Kullanıcı adınız">
        </div>
        <div class="form-grup">
            <label>🔑 Şifre</label>
            <input type="password" name="sifre" required placeholder="Şifreniz">
        </div>
        <button type="submit" class="btn-giris">Giriş Yap →</button>
    </form>
</div>
</body>
</html>
