{% raw %}<style>
.sehir-pin {
    position:absolute;display:flex;align-items:center;gap:4px;
    cursor:pointer;transition:all 0.2s;z-index:2;
    padding:3px 8px;border-radius:12px;
    background:rgba(34,113,177,0.35);border:1px solid rgba(34,113,177,0.5);
    font-size:0.65rem;font-weight:700;color:white;white-space:nowrap;
}
.sehir-pin:hover {
    background:rgba(34,113,177,0.7);transform:scale(1.12);z-index:10;
    box-shadow:0 0 12px rgba(34,113,177,0.5);
}
.sehir-pin.buyuk {
    font-size:0.72rem;padding:4px 10px;
    background:rgba(255,180,40,0.3);border-color:rgba(255,180,40,0.5);
}
.sehir-pin.buyuk:hover {
    background:rgba(255,180,40,0.6);box-shadow:0 0 14px rgba(255,180,40,0.4);
}
.sehir-pin .pin-sayi {
    background:rgba(255,255,255,0.2);border-radius:8px;padding:0 5px;
    font-size:0.6rem;min-width:16px;text-align:center;
}
.harita-uni-item {
    background:rgba(255,255,255,0.05);border-radius:8px;padding:0.45rem 0.7rem;
    font-size:0.82rem;color:rgba(255,255,255,0.75);
    border-left:3px solid rgba(34,113,177,0.4);
    display:flex;align-items:center;gap:0.5rem;
}
.harita-uni-item .tm-badge {
    background:rgba(39,174,96,0.3);color:#7dfa9e;font-size:0.62rem;
    padding:1px 5px;border-radius:10px;font-weight:700;white-space:nowrap;
}
@media(max-width:768px){
    .sehir-pin { font-size:0.55rem;padding:2px 5px; }
    .sehir-pin.buyuk { font-size:0.6rem;padding:3px 7px; }
}
</style>{% endraw %}

(function(){
    var wrap = document.getElementById('sehir-noktalar');
    if(!wrap) return;
    var buyukSehirler = ['İstanbul','Ankara','İzmir','Bursa','Antalya','Konya','Gaziantep','Adana','Trabzon','Kayseri','Samsun','Erzurum'];
    for(var s in uniVeri){
        var v = uniVeri[s];
        var div = document.createElement('div');
        div.className = 'sehir-pin' + (buyukSehirler.indexOf(s)!==-1?' buyuk':'');
        div.style.left = v.x + '%';
        div.style.top = v.y + '%';
        div.innerHTML = s + ' <span class="pin-sayi">' + v.u.length + '</span>';
        div.setAttribute('data-sehir', s);
        div.onclick = function(){ haritaSehirSec(this.getAttribute('data-sehir')); };
        wrap.appendChild(div);
    }
})();

function haritaSehirSec(sehir){
    var v = uniVeri[sehir];
    if(!v) return;
    document.getElementById('harita-sehir-adi').innerHTML = '🎓 ' + sehir + ' <span style="color:rgba(255,255,255,0.4);font-size:0.8rem;">(' + v.u.length + ' üniversite)</span>';
    var html = '';
    for(var i=0;i<v.u.length;i++){
        html += '<div class="harita-uni-item"><span style="color:#60b3f0;font-size:0.75rem;min-width:20px;">' + (i+1) + '.</span> ' + v.u[i] + ' <span class="tm-badge">✅ TM</span></div>';
    }
    document.getElementById('harita-uni-liste').innerHTML = html;
    document.getElementById('harita-uni-panel').style.display = 'block';
    document.getElementById('harita-uni-panel').scrollIntoView({behavior:'smooth',block:'nearest'});
    // Aktif pin highlight
    document.querySelectorAll('.sehir-pin').forEach(function(p){p.style.opacity=p.getAttribute('data-sehir')===sehir?'1':'0.4';});
}
function haritaPanelKapat(){
    document.getElementById('harita-uni-panel').style.display='none';
    document.querySelectorAll('.sehir-pin').forEach(function(p){p.style.opacity='1';});
}
</script>{% endraw %}
