<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Üniversite Dünya Haritası — Trust Consulting</title>
</head>
<body>
<style>
/* Globe sayfasında header, footer, butonları gizle */
.tc-header, footer, .tc-global-float, .fiyat-float-btn,
.whatsapp-float, nav, .baslik-karti { display: none !important; }

body { margin: 0; padding: 0; overflow: hidden; background: #020810; }

#globe-wrap {
    position: fixed;
    inset: 0;
    background: #020810;
}
#map {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
}

/* Legend butonu - sol alt */
.globe-legend-btn {
    position: fixed;
    bottom: 20px;
    left: 16px;
    z-index: 100;
    background: rgba(10,22,40,0.92);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50%;
    width: 46px; height: 46px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem;
    cursor: pointer;
    backdrop-filter: blur(8px);
    box-shadow: 0 4px 14px rgba(0,0,0,0.5);
    transition: transform 0.2s;
}
.globe-legend-btn:hover { transform: scale(1.1); }

/* Legend panel */
.globe-legend-panel {
    position: fixed;
    bottom: 76px;
    left: 16px;
    z-index: 100;
    background: rgba(8,18,35,0.95);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px;
    padding: 12px 14px;
    color: white;
    font-size: 0.73rem;
    min-width: 170px;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.6);
    display: none;
    animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.globe-legend-panel.acik { display: block; }

.legend-baslik {
    color: rgba(255,255,255,0.45);
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 9px;
    font-weight: 600;
}
.legend-item {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 6px; font-size: 0.73rem; color: rgba(255,255,255,0.85);
}
.legend-renk {
    width: 11px; height: 11px;
    border-radius: 50%; flex-shrink: 0;
}

/* Popup */
.mapboxgl-popup-content {
    background: rgba(8,18,35,0.97) !important;
    border: 1px solid rgba(255,255,255,0.15) !important;
    border-radius: 14px !important;
    padding: 0 !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.7) !important;
    color: white !important;
    max-width: 260px !important;
}
.mapboxgl-popup-tip { display: none !important; }
.mapboxgl-popup-close-button {
    color: rgba(255,255,255,0.6) !important;
    font-size: 16px !important;
    right: 6px !important; top: 6px !important;
}
.mapboxgl-popup-close-button:hover { color: white !important; background: none !important; }
.popup-ic { padding: 14px 16px; }
.popup-ulke { font-size: 1rem; font-weight: 700; margin-bottom: 3px; }
.popup-sehir { color: rgba(255,255,255,0.55); font-size: 0.73rem; margin-bottom: 8px; }
.popup-say { background: rgba(37,117,252,0.2); border: 1px solid rgba(37,117,252,0.3); border-radius: 8px; padding: 5px 10px; font-size: 0.76rem; color: #5bc4f5; font-weight: 600; margin-bottom: 8px; }
.popup-unis { list-style:none; margin:0; padding:0; font-size:0.74rem; color:rgba(255,255,255,0.8); max-height:150px; overflow-y:auto; }
.popup-unis li { padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.06); display:flex; align-items:center; gap:6px; }
.popup-unis li:last-child { border-bottom:none; }
.popup-unis li::before { content:''; width:5px; height:5px; border-radius:50%; background:#5bc4f5; flex-shrink:0; }
.popup-btn { display:block; text-align:center; padding:8px; background:linear-gradient(135deg,#2575fc,#6a11cb); color:white !important; font-size:0.76rem; font-weight:700; text-decoration:none; border-radius:0 0 14px 14px; }
</style>

<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>

<div id="globe-wrap">
    <div id="map"></div>
</div>

<!-- 🌍 Legend Butonu -->
<button class="globe-legend-btn" onclick="legendToggle()" title="Ülkeler">🌍</button>
<div class="globe-legend-panel" id="legendPanel">
    <div class="legend-baslik">Üniversiteli Ülkeler</div>
    <div class="legend-item"><div class="legend-renk" style="background:#e74c3c"></div> Türkiye</div>
    <div class="legend-item"><div class="legend-renk" style="background:#3498db"></div> Rusya</div>
    <div class="legend-item"><div class="legend-renk" style="background:#f39c12"></div> Almanya · Avusturya · Çekya</div>
    <div class="legend-item"><div class="legend-renk" style="background:#9b59b6"></div> Belçika · Hollanda</div>
    <div class="legend-item"><div class="legend-renk" style="background:#27ae60"></div> İtalya</div>
    <div class="legend-item"><div class="legend-renk" style="background:#e67e22"></div> Kanada</div>
    <div class="legend-item"><div class="legend-renk" style="background:#e91e8c"></div> Japonya · Güney Kore</div>
    <div class="legend-item"><div class="legend-renk" style="background:#ffc107"></div> Kıbrıs</div>
    <div class="legend-item"><div class="legend-renk" style="background:#1abc9c"></div> Orta Asya</div>
    <div class="legend-item"><div class="legend-renk" style="background:#00bcd4"></div> G.D. Asya</div>
</div>

<script>
function legendToggle(){
    document.getElementById('legendPanel').classList.toggle('acik');
}
document.addEventListener('click', function(e){
    if(!e.target.closest('.globe-legend-btn') && !e.target.closest('.globe-legend-panel')){
        document.getElementById('legendPanel').classList.remove('acik');
    }
});

mapboxgl.accessToken = '{{ mapbox_token }}';

var map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/dark-v11',
    projection: 'globe',
    zoom: isMobile ? 1.2 : 1.8,
    center: [45, 35],
    antialias: !isMobile,
    fadeDuration: 0,
    maxTileCacheSize: isMobile ? 20 : 60
});

map.addControl(new mapboxgl.NavigationControl({showCompass:false}), 'top-right');

if(!isMobile){
    map.addControl(new mapboxgl.ScaleControl(), 'bottom-right');
}

        'CY':'#ffc107','TH':'#00bcd4','VN':'#00bcd4'

    // Pulse
    map.addLayer({
        id:'sehir-pulse', type:'circle', source:'sehirler',
        paint:{'circle-radius':14,'circle-color':['get','color'],'circle-opacity':0.15}
    });
    // Nokta
    map.addLayer({
        id:'sehir-nokta', type:'circle', source:'sehirler',
        paint:{
            'circle-radius':['interpolate',['linear'],['zoom'],1,5,5,8,10,12],
            'circle-color':['get','color'],
            'circle-stroke-width':1.8,
            'circle-stroke-color':'rgba(255,255,255,0.6)',
            'circle-opacity':0.95
        }
    });
    // İsimler
    map.addLayer({
        id:'sehir-label', type:'symbol', source:'sehirler',
        layout:{
            'text-field':['get','n'],
            'text-size':['interpolate',['linear'],['zoom'],3,0,4,10,10,13],
            'text-offset':[0,1.4], 'text-anchor':'top',
            'text-font':['DIN Offc Pro Bold','Arial Unicode MS Bold']
        },
        paint:{'text-color':'#fff','text-halo-color':'rgba(0,0,0,0.75)','text-halo-width':1.5}
    });

    // Tıklama
    map.on('click','sehir-nokta', function(e){
        var p = e.features[0].properties;
        var unis = JSON.parse(p.unis);
        var liHtml = unis.map(function(u){ return '<li>'+u+'</li>'; }).join('');
        new mapboxgl.Popup({offset:10, closeButton:true, maxWidth:'260px'})
            .setLngLat(e.features[0].geometry.coordinates)
            .setHTML('<div class="popup-ic"><div class="popup-ulke">'+p.flag+' '+p.n+'</div><div class="popup-say">🎓 '+p.cnt+'</div><ul class="popup-unis">'+liHtml+'</ul></div><a href="'+p.href+'" class="popup-btn">Tüm listeyi gör →</a>')
            .addTo(map);
    });

    map.on('mouseenter','sehir-nokta',function(){ map.getCanvas().style.cursor='pointer'; });
    map.on('mouseleave','sehir-nokta',function(){ map.getCanvas().style.cursor=''; });

    // Pulse animasyon - mobilde daha hafif
    if(!isMobile){
        var r=0, grow=true;
        setInterval(function(){
            if(grow) r+=0.4; else r-=0.4;
            if(r>=7) grow=false; if(r<=0) grow=true;
            if(map.getLayer('sehir-pulse')){
                map.setPaintProperty('sehir-pulse','circle-radius',14+r);
                map.setPaintProperty('sehir-pulse','circle-opacity',0.15-r*0.015);
            }
        },60);
    }
});

// Otomatik dönüş - mobilde daha yavaş
map.on('load', function(){
    var spinning = true;
    var deg = 45;
    var speed = isMobile ? 0.025 : 0.04;

    function spin(){
        if(!spinning) return;
        deg = (deg + speed) % 360;
        map.setCenter([deg < 180 ? deg : deg-360, 30]);
        requestAnimationFrame(spin);
    }

    map.on('mousedown', function(){ spinning = false; });
    map.on('touchstart', function(){ spinning = false; });
    map.on('mouseup', function(){
        setTimeout(function(){ spinning = true; spin(); }, 3000);
    });

    spin();
});
</script>
