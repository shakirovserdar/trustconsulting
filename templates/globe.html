{% extends 'base.html' %}
{% block content %}

<style>
.globe-sayfa {
    padding: 0;
    margin: 0;
    background: #060f1e;
}
#map-container {
    position: relative;
    width: 100%;
    height: calc(100vh - 62px);
    background: #060f1e;
}
#map {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
}

/* Başlık */
.globe-header {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    background: rgba(10,22,40,0.88);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 50px;
    padding: 8px 20px;
    color: white;
    font-size: 0.82rem;
    font-weight: 600;
    white-space: nowrap;
    letter-spacing: 0.3px;
}
.globe-header span { color: #5bc4f5; }

/* Popup */
.mapboxgl-popup-content {
    background: rgba(10,22,40,0.97) !important;
    border: 1px solid rgba(255,255,255,0.15) !important;
    border-radius: 14px !important;
    padding: 0 !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important;
    color: white !important;
    max-width: 260px !important;
}
.mapboxgl-popup-close-button {
    color: rgba(255,255,255,0.6) !important;
    font-size: 18px !important;
    padding: 8px 12px !important;
}
.mapboxgl-popup-tip { display: none !important; }
.mapboxgl-popup-close-button:hover { color: white !important; background: none !important; }

.popup-ic {
    padding: 14px 16px;
}
.popup-ulke {
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 7px;
}
.popup-sehir {
    color: rgba(255,255,255,0.6);
    font-size: 0.75rem;
    margin-bottom: 10px;
}
.popup-say {
    background: rgba(37,117,252,0.2);
    border: 1px solid rgba(37,117,252,0.3);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 0.78rem;
    color: #5bc4f5;
    margin-bottom: 10px;
    font-weight: 600;
}
.popup-unis {
    list-style: none;
    margin: 0;
    padding: 0;
    font-size: 0.76rem;
    color: rgba(255,255,255,0.8);
    max-height: 160px;
    overflow-y: auto;
}
.popup-unis li {
    padding: 4px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    gap: 6px;
}
.popup-unis li:last-child { border-bottom: none; }
.popup-unis li::before {
    content: '';
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #5bc4f5;
    flex-shrink: 0;
}
.popup-unis::-webkit-scrollbar { width: 3px; }
.popup-unis::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

.popup-btn {
    display: block;
    text-align: center;
    padding: 8px;
    background: linear-gradient(135deg, #2575fc, #6a11cb);
    color: white !important;
    font-size: 0.78rem;
    font-weight: 700;
    text-decoration: none;
    border-radius: 0 0 14px 14px;
    transition: opacity 0.2s;
}
.popup-btn:hover { opacity: 0.85; }

/* Legend */
.globe-legend {
    position: absolute;
    bottom: 30px;
    left: 14px;
    z-index: 10;
    background: rgba(10,22,40,0.88);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 10px 14px;
    color: white;
    font-size: 0.72rem;
    max-width: 160px;
}
.legend-title {
    color: rgba(255,255,255,0.5);
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
}
.legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-bottom: 5px;
    font-size: 0.72rem;
}
.legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
}

/* Kontrol ipucu */
.globe-tip {
    position: absolute;
    bottom: 30px;
    right: 14px;
    z-index: 10;
    color: rgba(255,255,255,0.3);
    font-size: 0.68rem;
    text-align: right;
    line-height: 1.6;
}
</style>

<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>

<div class="globe-sayfa">
<div id="map-container">
    <div id="map"></div>

    <div class="globe-header">
        🌍 <span>Trust Consulting</span> — Üniversite Haritası
    </div>

    <div class="globe-legend">
        <div class="legend-title">Üniversite Bölgeleri</div>
        <div class="legend-item"><div class="legend-dot" style="background:#e74c3c"></div> Türkiye</div>
        <div class="legend-item"><div class="legend-dot" style="background:#3498db"></div> Rusya</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f39c12"></div> Almanya / AT / CZ</div>
        <div class="legend-item"><div class="legend-dot" style="background:#9b59b6"></div> Belçika / NL</div>
        <div class="legend-item"><div class="legend-dot" style="background:#27ae60"></div> İtalya</div>
        <div class="legend-item"><div class="legend-dot" style="background:#e67e22"></div> Kanada</div>

        <div class="legend-item"><div class="legend-dot" style="background:#00bcd4"></div> Güneydoğu Asya</div>
    </div>

    <div class="globe-tip">
        🖱 Sürükle · Scroll zoom<br>
        📍 Şehre tıkla
    </div>
</div>

<script>
mapboxgl.accessToken = '{{ mapbox_token }}';

const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/dark-v11',
    projection: 'globe',
    zoom: 1.8,
    center: [40, 40],
    pitch: 0,
    bearing: 0,
    antialias: true
});

map.addControl(new mapboxgl.NavigationControl({showCompass: true}), 'top-right');
map.addControl(new mapboxgl.ScaleControl(), 'bottom-right');

    map.setFog({
        color: 'rgb(4, 12, 26)',
        'high-color': 'rgb(15, 30, 60)',
        'horizon-blend': 0.04,
        'space-color': 'rgb(2, 6, 16)',
        'star-intensity': 0.8

    // Ülke highlight layer
    map.addSource('country-fills', {
        type: 'vector',
        url: 'mapbox://mapbox.country-boundaries-v1'
    });

    // Üniversiteli ülkeler
    const UNI_ULKELER = {
        'TR': '#e74c3c',  // Türkiye
        'RU': '#3498db',  // Rusya
        'DE': '#f39c12',  // Almanya
        'AT': '#f39c12',  // Avusturya
        'CZ': '#f39c12',  // Çekya
        'BE': '#9b59b6',  // Belçika
        'NL': '#9b59b6',  // Hollanda
        'IT': '#27ae60',  // İtalya
        'CA': '#e67e22',  // Kanada
        'JP': '#e91e8c',  // Japonya
        'KR': '#e91e8c',  // Güney Kore
        'KZ': '#1abc9c',  // Kazakistan
        'KG': '#1abc9c',  // Kırgızistan
        'BY': '#1abc9c',  // Beyaz Rusya
        'AZ': '#1abc9c',  // Azerbaycan
        'UZ': '#1abc9c',  // Özbekistan
        'GE': '#1abc9c',  // Gürcistan
        'CY': '#ffc107',  // Kıbrıs
        'TH': '#00bcd4',  // Tayland
        'VN': '#00bcd4',  // Vietnam
    };

    const countryList = Object.keys(UNI_ULKELER);

    // Tüm ülkeler hafif görünsün
    map.addLayer({
        id: 'country-bg',
        type: 'fill',
        source: 'country-fills',
        'source-layer': 'country_boundaries',
        paint: {
            'fill-color': 'rgba(255,255,255,0.03)',
            'fill-opacity': 1
        }
    }, 'waterway-label');

    // Üniversiteli ülkeler renkli
    const colorExpr = ['match', ['get', 'iso_3166_1']];
    countryList.forEach(code => {
        colorExpr.push(code, UNI_ULKELER[code]);
    });
    colorExpr.push('transparent');

    const opacityExpr = ['match', ['get', 'iso_3166_1'],
        countryList, 0.35,
        0
    ];

    map.addLayer({
        id: 'uni-countries',
        type: 'fill',
        source: 'country-fills',

            'fill-color': colorExpr,

            // VİETNAM
            {type:'Feature',geometry:{type:'Point',coordinates:[105.8,21.0]},properties:{n:'Hanoi',flag:'🇻🇳',color:'#ef5350',cnt:'2 üniversite',unis:['VNU Hanoi','Duy Tan Üniversitesi'],href:'/universiteler#vietnam'}},
            {type:'Feature',geometry:{type:'Point',coordinates:[106.7,10.8]},properties:{n:'Ho Chi Minh',flag:'🇻🇳',color:'#ef5350',cnt:'2 üniversite',unis:['VNU Ho Chi Minh','Ton Duc Thang Ü.'],href:'/universiteler#vietnam'}},
        ]
    };

    map.addSource('sehirler', {type: 'geojson', data: sehirler});

    // Dış halka (pulse)
    map.addLayer({
        id: 'sehir-pulse',
        type: 'circle',
        source: 'sehirler',
        paint: {
            'circle-radius': 14,
            'circle-color': ['get', 'color'],
            'circle-opacity': 0.2,
            'circle-stroke-width': 0
        }
    });

    // Ana nokta
    map.addLayer({
        id: 'sehir-nokta',
        type: 'circle',
        source: 'sehirler',
        paint: {
            'circle-radius': ['interpolate', ['linear'], ['zoom'], 1, 5, 6, 8, 10, 12],
            'circle-color': ['get', 'color'],
            'circle-stroke-width': 2,
            'circle-stroke-color': 'rgba(255,255,255,0.6)',
            'circle-opacity': 0.95
        }
    });

    // Şehir ismi (yakınlaştıkça görünür)
    map.addLayer({
        id: 'sehir-label',
        type: 'symbol',
        source: 'sehirler',
        layout: {
            'text-field': ['get', 'n'],
            'text-size': ['interpolate', ['linear'], ['zoom'], 3, 9, 6, 11, 10, 13],
            'text-offset': [0, 1.5],
            'text-anchor': 'top',
            'text-font': ['DIN Offc Pro Bold', 'Arial Unicode MS Bold'],
        },
        paint: {
            'text-color': '#ffffff',
            'text-halo-color': 'rgba(0,0,0,0.7)',
            'text-halo-width': 1.5,
            'text-opacity': ['interpolate', ['linear'], ['zoom'], 2, 0, 3, 1]
        }
    });

    // Tıklama popup
    map.on('click', 'sehir-nokta', (e) => {
        const p = e.features[0].properties;
        const unis = JSON.parse(p.unis);

        const liItems = unis.map(u => `<li>${u}</li>`).join('');

        new mapboxgl.Popup({offset: 10, closeButton: true, maxWidth: '260px'})
            .setLngLat(e.features[0].geometry.coordinates)
            .setHTML(`
                <div class="popup-ic">
                    <div class="popup-ulke">${p.flag} ${p.n}</div>
                    <div class="popup-sehir">${p.cnt}</div>
                    <div class="popup-say">🎓 ${p.cnt}</div>
                    <ul class="popup-unis">${liItems}</ul>
                </div>
                <a href="${p.href}" class="popup-btn">Tüm listeyi gör →</a>
            `)
            .addTo(map);
    });

    // Hover cursor
    map.on('mouseenter', 'sehir-nokta', () => { map.getCanvas().style.cursor = 'pointer'; });
    map.on('mouseleave', 'sehir-nokta', () => { map.getCanvas().style.cursor = ''; });

    // Pulse animasyonu
    let r = 0, growing = true;
    setInterval(() => {
        if(growing) r += 0.5; else r -= 0.5;
        if(r >= 8) growing = false;
        if(r <= 0) growing = true;
        if(map.getLayer('sehir-pulse')){
            map.setPaintProperty('sehir-pulse', 'circle-radius', 14 + r);
            map.setPaintProperty('sehir-pulse', 'circle-opacity', 0.2 - r * 0.018);
        }
    }, 50);
});

// Globe döndürme butonu
map.on('load', () => {
    let spinning = true;
    const btn = document.createElement('button');
    btn.innerHTML = '⏸';
    btn.title = 'Otomatik dönüşü durdur/başlat';
    btn.style.cssText = 'position:absolute;top:14px;right:52px;z-index:10;background:rgba(10,22,40,0.88);border:1px solid rgba(255,255,255,0.2);color:white;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:14px;backdrop-filter:blur(8px);';
    document.getElementById('map-container').appendChild(btn);

    let deg = 0;
    function spinGlobe(){
        if(!spinning) return;
        deg = (deg + 0.04) % 360;
        map.setCenter([deg < 180 ? deg : deg - 360, 30]);
        requestAnimationFrame(spinGlobe);
    }

    map.on('mousedown', () => { spinning = false; btn.innerHTML = '▶'; });
    map.on('touchstart', () => { spinning = false; btn.innerHTML = '▶'; });

    btn.addEventListener('click', () => {
        spinning = !spinning;
        btn.innerHTML = spinning ? '⏸' : '▶';
        if(spinning) spinGlobe();
    });

    spinGlobe();
});
</script>

{% endblock %}
